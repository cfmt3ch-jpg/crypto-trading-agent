# Crypto Trading Agent Configuration

# Exchange Configuration
exchange:
  name: binance  # binance, bybit, okx, etc.
  api_key: ${EXCHANGE_API_KEY}
  api_secret: ${EXCHANGE_API_SECRET}
  testnet: true  # Use testnet for paper trading
  rate_limit: 1200  # Requests per minute

# Trading Configuration
trading:
  pairs:
    - BTC/USDT
    - ETH/USDT
  timeframe: 1h  # 1m, 5m, 15m, 1h, 4h, 1d
  max_positions: 5
  risk_per_trade: 0.02  # 2% of portfolio
  max_drawdown: 0.20  # 20% max drawdown

# Order Configuration
orders:
  default_type: limit  # limit, market
  time_in_force: GTC  # GTC, IOC, FOK
  post_only: false
  reduce_only: false

# Strategy Configuration
strategy:
  name: sma_crossover  # sma_crossover, rsi, ml
  params:
    # SMA Crossover
    short_period: 20
    long_period: 50
    
    # RSI
    rsi_period: 14
    oversold: 30
    overbought: 70
    
    # ML (future)
    model_path: models/trained_model.pkl

# Risk Management
risk:
  stop_loss_pct: 0.05  # 5%
  take_profit_pct: 0.10  # 10%
  trailing_stop: false
  trailing_stop_pct: 0.03  # 3%
  max_open_trades: 3
  min_trade_amount: 10  # USDT

# Logging
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  file: logs/trading.log
  rotation: 1 day
  retention: 30 days

# API Server (for dashboard)
api:
  enabled: true
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - http://localhost:3000
    - http://localhost:8080

# Notifications (optional)
notifications:
  enabled: false
  telegram:
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
  discord:
    webhook_url: ${DISCORD_WEBHOOK_URL}

# Data Storage
data:
  historical_path: data/historical
  cache_path: data/cache
  database_url: sqlite:///data/trading.db

# Backtesting
backtest:
  initial_capital: 10000  # USDT
  commission: 0.001  # 0.1%
  slippage: 0.0005  # 0.05%
